<div class="console">

  <div class="console-header">
    <span class="console-title">▶ RELAY console</span>
    <span class="console-status">{{ messages.length }} eventos</span>
  </div>

  <div class="console-output">
    @for (m of messages; track m.id) {
    <div class="console-line">
      <span class="console-time">{{ m.timestamp | date:'HH:mm:ss' }}</span>
      <span class="console-agent"> {{ agentsMap.get(m.agentId)?.emoji }} {{
        m.agentId }}
      </span> <span class="console-sep">$</span>
      <span class="console-text">{{ m.text }}</span>
    </div>
    }
  </div>

</div>
