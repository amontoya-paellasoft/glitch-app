<header class="topbar">
  <div class="nav-left">
    <span class="status-led"></span>
    <span class="topbar-title">{{ 'APP_1001_TITLE' | translate }}</span>
  </div>

  <nav class="nav-center">
    <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">{{ 'AGENT_MAP' | translate }}</a>
    <a class="nav-link" routerLink="/to-do" routerLinkActive="active">{{ 'TODO.TITLE' | translate }}</a>
  </nav>

  <div class="lang-wrapper">
    <div class="lang-selector" [class.expanded]="isLangMenuOpen">
      <div class="lang-current" (click)="toggleMenu()">
        {{ idiomaActual }}
      </div>

      <div class="lang-options">
        @for (lang of ['es', 'en']; track lang) {
          <button
            class="lang-btn"
            [class.active]="idiomaActual === lang"
            (click)="selectLanguage(lang)"
          >
            {{ lang }}
          </button>
        }
      </div>
    </div>
  </div>
</header>
