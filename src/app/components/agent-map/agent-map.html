<div class="graph-container">
  <ngx-graph [nodes]="nodes" [links]="links" layout="dagre" class="dark-graph">

    <ng-template #nodeTemplate let-node>
      <svg:g class="node-container">
        <svg:rect width="200" height="60" rx="12" fill="#ffffff" stroke="#d4af37" stroke-width="1" />

        <svg:path d="M 0 12 Q 0 0 12 0 L 40 0 L 40 60 L 12 60 Q 0 60 0 48 Z" fill="#d4af37" opacity="0.15" />

        <svg:text x="15" y="36" font-size="20">{{ node.data.emoji }}</svg:text>
        <svg:text x="50" y="25" font-weight="600" fill="#1a1a18" font-size="12">{{ node.label }}</svg:text>
        <svg:text x="50" y="42" fill="#6b6b67" font-size="10" text-transform="uppercase">{{ node.data.role }}</svg:text>

        <svg:circle cx="185" cy="15" r="4" [attr.fill]="node.data.status === 'en línea' ? '#d4af37' : '#e5e5e5'" />
      </svg:g>
    </ng-template>

    <ng-template #linkTemplate let-link>
      <svg:g class="edge">
        <svg:path class="line" stroke-width="1.5" stroke="#333" marker-end="url(#arrow)"></svg:path>
      </svg:g>
    </ng-template>
  </ngx-graph>
</div>
