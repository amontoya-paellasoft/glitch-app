
<!-- Contenedor del mapa -->
<div class="contenedor">

  <!-- SVG: captura drag con mouse -->
  <svg #svgRef class="graph-svg" viewBox="0 0 680 520"
      (mousemove)="onDragMover($event)"
      (mouseup)="onDragFin()"
      (mouseleave)="onDragFin()">

    <defs>
      <!-- punta de flecha dorada-->
      <marker
        id="arrow-gold"
        viewBox="0 0 10 10"
        refX="8"
        refY="5"
        markerWidth="5"
        markerHeight="5"
        orient="auto-start-reverse"
      >
        <path
          d="M2 1L8 5L2 9"
          fill="none"
          stroke="#C9A227"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </marker>
      <!-- punta de flecha apagada -->
      <marker
        id="arrow-idle"
        viewBox="0 0 10 10"
        refX="8"
        refY="5"
        markerWidth="5"
        markerHeight="5"
        orient="auto-start-reverse"
      >
        <path
          d="M2 1L8 5L2 9"
          fill="none"
          stroke="#C4A882"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </marker>
    </defs>

    <!-- Anillos decorativos de fondo -->
    <circle
      cx="340"
      cy="260"
      r="190"
      fill="none"
      stroke="#D4AF37"
      stroke-width="0.5"
      stroke-dasharray="3 10"
      opacity="0.2"
    />
    <circle
      cx="340"
      cy="260"
      r="110"
      fill="none"
      stroke="#D4AF37"
      stroke-width="0.4"
      stroke-dasharray="2 8"
      opacity="0.15"
    />

    <!-- LINKS entre nodos -->
    @for (link of links; track link.source + link.target) {
      <g class="link-group">
        <!-- flecha solo si el link está activo -->
        @if (isLinkActive(link.source, link.target)) {
          <path
            [attr.d]="getLinkPath(link.source, link.target)"
            fill="none"
            stroke="#D4AF37"
            stroke-width="2"
            [class]="
              getLinkDirection(link.source, link.target) === 'hasta'
                ? 'chevron-bwd'
                : 'chevron-fwd'
            "
            marker-end="url(#arrow-gold)"
          />
        }
      </g>
    }

    <!-- Broadcast: flechas hacia todos msgs públicos -->
    @for (target of broadcastTargets(); track target.id) {
      @if (getNode(mensajeActivo()!.from)) {
        <path
          [attr.d]="getLinkPath(mensajeActivo()!.from, target.id)"
          fill="none"
          stroke="#D4AF37"
          stroke-width="1.5"
          class="chevron-fwd"
          stroke-opacity="0.6"
          marker-end="url(#arrow-gold)"
        />
      }
    }

    <!-- NODOS -->
    @for (node of nodes; track node.id) {
      <g
        class="node-container"
        [attr.data-node-id]="node.id"
        [attr.transform]="'translate(' + node.x + ',' + node.y + ')'"
        (click)="onNodeClick(node)"
      >
        <!-- clip para que el acento lateral no se salga del borde -->
        <defs>
          <clipPath [attr.id]="'clip-' + node.id">
            <rect [attr.width]="node.w ?? NODE_W" [attr.height]="node.h ?? NODE_H" rx="7" />
          </clipPath>
        </defs>

        <!-- cuerpo de la tarjeta -->
        <rect
          [attr.width]="node.w ?? NODE_W"
          [attr.height]="node.h ?? NODE_H"
          rx="7"
          fill="#FFFBF0"
          [attr.stroke]="
            isNodeSpeaking(node.id) ? '#C9A227' : isNodeListening(node.id) ? '#6B9E68' : '#D4C4A0'
          "
          [attr.stroke-width]="isNodeSpeaking(node.id) || isNodeListening(node.id) ? '1.5' : '1'"
        />

        <!-- acento de color lateral izquierdo depende del estado -->
        <rect
          width="6"
          [attr.height]="node.h ?? NODE_H"
          [attr.clip-path]="'url(#clip-' + node.id + ')'"
          [attr.fill]="
            isConsoleOpen(node.id)
              ? '#01FF00'
              : node.data.status === 'en línea'
                ? '#6B9E68'
                : node.data.status === 'ocupado'
                  ? '#C9882A'
                  : '#B4B2A9'
          "
        />

        <!-- badge cuando la consola del agente está abierta -->
        @if (isConsoleOpen(node.id)) {
          <rect x="112" y="32" width="40" height="14" fill="#000" />
          <text
            x="132"
            y="40"
            text-anchor="middle"
            dominant-baseline="middle"
            font-size="8.5"
            font-family="monospace"
            fill="#01FF00"
            letter-spacing="0.5"
          >[CON]</text>
        }

        <!-- Contenido interno -->
        @if (node.id === 'us') {
          <!-- nodo especial: user-->
          @if (node.data.image) {
            <clipPath [attr.id]="'clip-avatar-' + node.id">
              <circle cx="30" cy="40" r="18" />
            </clipPath>
            <image
              [attr.href]="node.data.image"
              x="12" y="22"
              width="36" height="36"
              [attr.clip-path]="'url(#clip-avatar-' + node.id + ')'"
            />
          } @else {
            <text x="10" y="48" font-size="32">{{ node.data.emoji }}</text>
          }
          <text
            x="60"
            y="30"
            font-size="13"
            font-weight="bold"
            font-family="'Segoe UI', sans-serif"
            fill="#3D3020"
          >
            {{ node.label }}
          </text>
          <text x="60" y="50" font-size="10" font-family="'Segoe UI', sans-serif" fill="#9B7A4A">
            {{ node.data.role | uppercase }}
          </text>
        } @else {

          <!-- nodo agente normal -->
          <!-- badge de estado-->
          <rect
            x="110"
            y="8"
            width="45"
            height="14"
            rx="7"
            [attr.fill]="
              node.data.status === 'en línea'
                ? '#EAF3DE'
                : node.data.status === 'ocupado'
                  ? '#FAEEDA'
                  : '#F1EFE8'
            "
            [attr.stroke]="
              node.data.status === 'en línea'
                ? '#97C459'
                : node.data.status === 'ocupado'
                  ? '#EF9F27'
                  : '#B4B2A9'
            "
            stroke-width="0.5"
          />
          <!-- bolita de color-->
          <circle
            cx="116"
            cy="15"
            r="3"
            [attr.fill]="
              node.data.status === 'en línea'
                ? '#4A8A47'
                : node.data.status === 'ocupado'
                  ? '#C9882A'
                  : '#888780'
            "
          />
          <!-- texto -->
          <text
            x="137"
            y="15"
            text-anchor="middle"
            dominant-baseline="middle"
            font-size="7"
            font-family="'Segoe UI', sans-serif"
            [attr.fill]="
              node.data.status === 'en línea'
                ? '#27500A'
                : node.data.status === 'ocupado'
                  ? '#633806'
                  : '#5F5E5A'
            "
          >
            {{ node.data.status | lowercase }}
          </text>

          <!-- avatar: imagen real si está disponible, emoji si no -->
          @if (node.data.image) {
            <clipPath [attr.id]="'clip-avatar-' + node.id">
              <circle cx="22" cy="22" r="11" />
            </clipPath>
            <image
              [attr.href]="node.data.image"
              x="11" y="11"
              width="22" height="22"
              [attr.clip-path]="'url(#clip-avatar-' + node.id + ')'"
            />
          } @else {
            <text x="11" y="25" font-size="16">{{ node.data.emoji }}</text>
          }

          <!-- nombre -->
          <text
            x="35"
            y="25"
            font-size="11"
            font-weight="bold"
            font-family="'Segoe UI', sans-serif"
            [attr.fill]="isNodeSpeaking(node.id) ? '#5C3D00' : '#3D3020'"
          >
            {{ node.label }}
          </text>

          <!-- rol-->
          <text
            x="36"
            y="40"
            font-size="9"
            font-family="'Segoe UI', sans-serif"
            fill="#9B7A4A"
            letter-spacing="0.05"
          >
            {{ node.data.role | uppercase }}
          </text>
        }

        <!-- área transparente encima de todo para capturar el drag sin interferir con clicks de texto -->
        <rect
          [attr.width]="node.w ?? NODE_W"
          [attr.height]="node.h ?? NODE_H"
          rx="7"
          fill="transparent"
          class="click-area"
          (mousedown)="onDragInicio($event, node)"
        />
      </g>
    }
  </svg>
</div>

@for (agentId of ws.ventanasAbiertas(); track agentId) {
  <app-floating-window [agentId]="agentId" />
}
