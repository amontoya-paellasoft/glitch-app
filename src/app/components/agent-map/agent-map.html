<div class="graph-container">
  <svg class="graph-svg" viewBox="0 0 680 520" preserveAspectRatio="xMidYMid meet">

    <defs>
      <marker id="arrow-gold" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#C9A227"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrow-idle" viewBox="0 0 10 10" refX="8" refY="5"
              markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#C4A882"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- anillos decorativos -->
    <circle cx="340" cy="260" r="190" fill="none"
            stroke="#D4AF37" stroke-width="0.5"
            stroke-dasharray="3 10" opacity="0.2"/>
    <circle cx="340" cy="260" r="110" fill="none"
            stroke="#D4AF37" stroke-width="0.4"
            stroke-dasharray="2 8" opacity="0.15"/>

    <!-- LINKS -->
    @for (link of links; track link.source + link.target) {
      <g class="link-group">

        <!-- chevron animado -->
        @if (isLinkActive(link.source, link.target)) {
          <path
            [attr.d]="getLinkPath(link.source, link.target)"
            fill="none"
            stroke="#D4AF37"
            stroke-width="2"
            [class]="getLinkDirection(link.source, link.target) === 'backward'
              ? 'chevron-bwd' : 'chevron-fwd'"
            marker-end="url(#arrow-gold)"
          />
        }
      </g>
    }

    <!-- Msgs All -->
    @for (target of broadcastTargets(); track target.id) {
      @if (getNode(mensajeActivo()!.from)) {
        <path
          [attr.d]="getLinkPath(mensajeActivo()!.from, target.id)"
          fill="none"
          stroke="#D4AF37"
          stroke-width="1.5"
          class="chevron-fwd"
          stroke-opacity="0.6"
          marker-end="url(#arrow-gold)"
        />
      }
    }

    <!-- NODOS -->
    @for (node of nodes; track node.id) {
      <g class="node-container" (click)="onNodeClick(node)"
         [attr.transform]="'translate(' + node.x + ',' + node.y + ')'">

        <defs>
          <clipPath [attr.id]="'clip-' + node.id">
            <rect [attr.width]="NODE_W" [attr.height]="NODE_H" rx="7"/>
          </clipPath>
        </defs>

        <!-- halo -->
        @if (isNodeSpeaking(node.id)) {
          <rect [attr.x]="-5" [attr.y]="-5"
                [attr.width]="NODE_W + 10" [attr.height]="NODE_H + 10"
                rx="10" fill="#D4AF37" opacity="0.15"/>
        }


        <!-- cuerpo -->
        <rect
          [attr.width]="NODE_W" [attr.height]="NODE_H" rx="7"
          fill="#FFFBF0"
          [attr.stroke]="isNodeSpeaking(node.id) ? '#C9A227' :
                         isNodeListening(node.id) ? '#6B9E68' : '#D4C4A0'"
          [attr.stroke-width]="isNodeSpeaking(node.id) ||
                               isNodeListening(node.id) ? '1.5' : '1'"
        />

        <!-- color lateral -->
        <rect width="6" [attr.height]="NODE_H"
              [attr.clip-path]="'url(#clip-' + node.id + ')'"
              [attr.fill]="node.data.status === 'en línea' ? '#6B9E68' :
                           node.data.status === 'ocupado'  ? '#C9882A' : '#B4B2A9'"/>

        <!-- badge estado -->
        <rect x="110" y="8" width="45" height="14" rx="7"
              [attr.fill]="node.data.status === 'en línea' ? '#EAF3DE' :
                           node.data.status === 'ocupado'  ? '#FAEEDA' : '#F1EFE8'"
              [attr.stroke]="node.data.status === 'en línea' ? '#97C459' :
                             node.data.status === 'ocupado'  ? '#EF9F27' : '#B4B2A9'"
              stroke-width="0.5"/>
        <circle cx="116" cy="15" r="3"
                [attr.fill]="node.data.status === 'en línea' ? '#4A8A47' :
                             node.data.status === 'ocupado'  ? '#C9882A' : '#888780'"/>
        <text x="137" y="15" text-anchor="middle" dominant-baseline="middle"
              font-size="7" font-family="'Segoe UI', sans-serif"
              [attr.fill]="node.data.status === 'en línea' ? '#27500A' :
                           node.data.status === 'ocupado'  ? '#633806' : '#5F5E5A'">
          {{ node.data.status | lowercase }}
        </text>

        <!-- emoji -->
        <text x="11" y="25" font-size="16">{{ node.data.emoji }}</text>

        <!-- nombre -->
        <text x="35" y="25" font-size="11" font-weight="bold"
              font-family="'Segoe UI', sans-serif"
              [attr.fill]="isNodeSpeaking(node.id) ? '#5C3D00' : '#3D3020'">
          {{ node.label }}
        </text>

        <!-- rol -->
        <text x="36" y="40" font-size="9"
              font-family="'Segoe UI', sans-serif"
              fill="#9B7A4A" letter-spacing="0.05">
          {{ node.data.role | uppercase }}
        </text>

      </g>
    }

  </svg>
</div>
