<div class="graph-container">
  <ngx-graph
    [nodes]="nodes"
    [links]="links"
    layout="dagre"
    [autoZoom]="true"
    [autoCenter]="true"
    [animate]="true"
    [layoutSettings]="layoutSettings"
  >
    <ng-template #nodeTemplate let-node>
      <svg:g class="node-container" (click)="onNodeClick(node)">
        <svg:rect
          width="150" height="60" rx="12"
          fill="#ffffff"
          stroke="#e0e0e0"
          stroke-width="1"
          filter="url(#shadow)"
        />

        <!-- franja lateral izquierda -->
        <svg:rect
          width="10" height="60" rx="12"
          fill="#f5da45"
          opacity="0.8"
        />
        <svg:text x="16" y="36" font-size="18">{{ node.data.emoji }}</svg:text>
        <svg:text x="44" y="24"
          font-weight="600" fill="#0a0a0a"
          font-size="9" font-family="'Segoe UI', sans-serif">
          {{ node.label }}
        </svg:text>
        <svg:text x="44" y="40"
          fill="#999" font-size="9"
          font-family="'Segoe UI', sans-serif"
          letter-spacing="0.06em">
          {{ node.data.role | uppercase }}
        </svg:text>

        <!-- estado -->
        <svg:circle cx="138" cy="10" r="4"
          [attr.fill]="node.data.status === 'en línea' ? '#22c55e' :
                       node.data.status === 'ocupado'  ? '#f59e0b' : '#d1d5db'"
        />
      </svg:g>
    </ng-template>

    <!-- label -->
    <ng-template #linkTemplate let-link>
      <svg:g class="edge">
        <svg:path
          stroke="#f5da45" stroke-width="1.5"
          fill="none"
          marker-end="url(#arrow)"
          [attr.d]="link.line"
        />
        <svg:path
          class="flow-line"
          stroke="#a3a3a3" stroke-width="1"
          fill="none"
          [attr.d]="link.line"
        />
      </svg:g>
    </ng-template>

    <ng-template #linkLabelTemplate let-link>
      <svg:g class="link-label">
        <svg:rect
          x="-18" y="-8"
          width="36" height="14"
          rx="3"
          fill="#f5f5f5"
          stroke="#e0e0e0"
          stroke-width="0.5"
        />
        <svg:text
          text-anchor="middle"
          dominant-baseline="middle"
          fill="#999"
          font-size="9"
          font-family="'Segoe UI', sans-serif"
          letter-spacing="0.04em">
          {{ link.label }}
        </svg:text>
      </svg:g>
    </ng-template>

  </ngx-graph>
</div>
