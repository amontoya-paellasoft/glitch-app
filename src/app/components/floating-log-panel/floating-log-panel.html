<div class="log-ventana" cdkDrag (click)="$event.stopPropagation()">

  <div class="log-header" cdkDragHandle>
    <span class="log-title">CONSOLE</span>
    <button class="close-btn" (click)="ws.cerrarLogPanel()">✕</button>
  </div>

  <ul class="nav nav-tabs">
    <li class="nav-item">
      <a class="nav-link" [class.active]="ws.logPanelTab() === 'stdout'"
         (click)="ws.logPanelTab.set('stdout')" role="button">
        STDOUT.LOG
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" [class.active]="ws.logPanelTab() === 'stderr'"
         (click)="ws.logPanelTab.set('stderr')" role="button">
        STDERR.LOG
      </a>
    </li>
  </ul>

  <div class="log-output">
    @if (ws.logPanelTab() === 'stdout') {
      <pre class="log-pre">{{ ws.logData()?.stdoutExcerpt }}</pre>
    } @else {
      <pre class="log-pre stderr">{{ ws.logData()?.stderrExcerpt || 'No errors.' }}</pre>
    }
  </div>

</div>
