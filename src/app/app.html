<div class="app-contenedor">
  <app-header />
  <div class="contenido-principal">
    <router-outlet />
    @if (ws.statsAbierto()) {
      <app-stats />
    }
  </div>

  @if (isMapRoute) {
    <app-control-panel />
  }

  @if (ws.agentSelec(); as agentId) {
    <app-agent-panel [agentId]="agentId" />
  }

  @if (ws.logPanelTab() !== null) {
    <app-floating-log-panel />
  }
</div>
