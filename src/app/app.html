<div class="app-contenedor">
  <app-header />
  <div class="contenido-principal">
    <app-agent-map />

    @if (ws.statsAbierto()) {
      <app-stats />
    }
      </div>
  <app-control-panel />


  @for (agentId of ws.ventanasAbiertas(); track agentId) {
    <app-floating-window [agentId]="agentId" />
  }

  @if (ws.agentSelec()) {
    <app-agent-panel [agentId]="ws.agentSelec()!" />
  }

</div>
