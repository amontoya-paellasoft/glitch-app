<div class="app-contenedor">
  <app-header />
  <div class="contenido-principal">
    <router-outlet />
    @if (ws.statsAbierto()) {
      <app-stats />
    }
  </div>
  @if (isMapRoute) {
    <app-control-panel />
  }

  @if (ws.agentSelec()) {
    <app-agent-panel [agentId]="ws.agentSelec()!" />
  }
</div>
